kind = "web"
previewPath = "/"
title = "Third Place"
version = "1.0.0"
id = "artifacts/third-place"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25205

[services.development]
run = "pnpm --filter @workspace/third-place run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/third-place", "run", "build" ]
publicDir = "artifacts/third-place/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25205"
BASE_PATH = "/"
